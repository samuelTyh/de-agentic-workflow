# CI pipeline for agent-workflow-dev.
# Validates config files and markdown on every PR to main.
# Branch protection enforces that merges require this pipeline to pass.
#
# Checks (v1):
#   - YAML syntax: all *.yaml / *.yml files parse cleanly
#   - JSON syntax: all *.json files parse cleanly
#   - Markdown lint: structural style check against .markdownlint.yaml
#   - CHANGELOG enforcement: fail if the PR does not touch CHANGELOG.md.
#     Opt-out by including [skip-changelog] in any commit message on the PR
#     (use sparingly — pure internal refactors, typo fixes, CI-only changes).
#
# TODO (future iterations):
#   - Agent schema check — verify each agents/*/CLAUDE.md has required sections
#     (Identity, Autonomous, Requires Approval, Forbidden, Integrations, Data Scope)
#   - Config consistency check — every agent directory must have an entry in
#     approval-tiers.yaml and data-boundaries.yaml, and vice versa
#   - Extract the CHANGELOG check into a reusable pipeline template at
#     templates/pipeline-templates/changelog-check.yaml so other CalVer-versioned
#     team repos can adopt the pattern in a single include.

trigger: none

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-24.04'

stages:
  - stage: Lint
    displayName: 'Lint and validate'
    jobs:
      - job: ValidateConfig
        displayName: 'Validate YAML and JSON'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.12'
            displayName: 'Use Python 3.12'

          - script: python -m pip install --upgrade pip pyyaml
            displayName: 'Install pyyaml'

          - script: |
              set -e
              fail=0
              while IFS= read -r -d '' f; do
                echo "Validating $f"
                if ! python -c "import sys, yaml; yaml.safe_load(open(sys.argv[1]))" "$f"; then
                  echo "::error file=$f::invalid YAML"
                  fail=1
                fi
              done < <(find . \( -path ./.git -o -path ./.venv -o -path ./node_modules -o -path ./.superpowers \) -prune -o \( -name '*.yaml' -o -name '*.yml' \) -type f -print0)
              exit $fail
            displayName: 'Validate YAML files'

          - script: |
              set -e
              fail=0
              while IFS= read -r -d '' f; do
                echo "Validating $f"
                if ! python -m json.tool "$f" > /dev/null; then
                  echo "::error file=$f::invalid JSON"
                  fail=1
                fi
              done < <(find . \( -path ./.git -o -path ./.venv -o -path ./node_modules -o -path ./.superpowers \) -prune -o -name '*.json' -type f -print0)
              exit $fail
            displayName: 'Validate JSON files'

      - job: MarkdownLint
        displayName: 'Lint markdown'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Use Node 20'

          - script: npm install -g markdownlint-cli@0.41.0
            displayName: 'Install markdownlint-cli'

          - script: |
              set -e
              markdownlint \
                --config .markdownlint.yaml \
                --ignore node_modules \
                --ignore .superpowers \
                --ignore .venv \
                "**/*.md"
            displayName: 'Run markdownlint'

      - job: ChangelogCheck
        displayName: 'Enforce CHANGELOG update'
        steps:
          - checkout: self
            # fetchDepth: 0 gives us full history so the diff can reach
            # the merge base with the target branch.
            # persistCredentials: true keeps the System.AccessToken-based
            # auth configured so subsequent `git fetch` calls work without
            # prompting for a password.
            persistCredentials: true
            fetchDepth: 0

          - script: |
              set -e

              # System.PullRequest.TargetBranch is of the form "refs/heads/main" or "main"
              # depending on pipeline context. Normalize to a bare ref name.
              TARGET="$(System.PullRequest.TargetBranch)"
              TARGET="${TARGET#refs/heads/}"
              if [ -z "$TARGET" ]; then
                echo "::error::Could not resolve target branch from System.PullRequest.TargetBranch"
                exit 1
              fi
              echo "PR target branch: $TARGET"

              git fetch --no-tags origin "$TARGET"

              # Opt-out: any commit message in the PR range contains [skip-changelog].
              PR_COMMITS="$(git log --format=%B "origin/$TARGET..HEAD")"
              if echo "$PR_COMMITS" | grep -qF '[skip-changelog]'; then
                echo "Opt-out marker [skip-changelog] found in a PR commit message — skipping CHANGELOG check."
                exit 0
              fi

              # Use three-dot diff to get only files the PR introduces, not files
              # main has moved ahead on since the PR branch was cut.
              CHANGED="$(git diff --name-only "origin/$TARGET...HEAD")"
              echo "Changed files in this PR:"
              echo "$CHANGED" | sed 's/^/  /'

              if echo "$CHANGED" | grep -qx 'CHANGELOG.md'; then
                echo "CHANGELOG.md updated — check passed."
                exit 0
              fi

              echo "::error::CHANGELOG.md was not updated. Add an entry under [Unreleased] describing the change, or include [skip-changelog] in a commit message if this PR is not user-facing (e.g. typo fix, pure internal refactor, CI-only tweak)."
              exit 1
            displayName: 'Check CHANGELOG.md is updated'
