# CI pipeline for agent-workflow-dev.
# Validates config files and markdown on every PR to main.
# Branch protection enforces that merges require this pipeline to pass.
#
# Checks (v1):
#   - YAML syntax: all *.yaml / *.yml files parse cleanly
#   - JSON syntax: all *.json files parse cleanly
#   - Markdown lint: structural style check against .markdownlint.yaml
#
# TODO (future iterations):
#   - Agent schema check — verify each agents/*/CLAUDE.md has required sections
#     (Identity, Autonomous, Requires Approval, Forbidden, Integrations, Data Scope)
#   - Config consistency check — every agent directory must have an entry in
#     approval-tiers.yaml and data-boundaries.yaml, and vice versa
#   - CHANGELOG enforcement — fail if the PR diff does not touch CHANGELOG.md
#     under [Unreleased]. Exempt PRs labeled "no-changelog" (pure internal
#     refactors, typo fixes) via a commit-message opt-out. This check will
#     also be extracted as a reusable step at
#     templates/pipeline-templates/changelog-check.yaml once the pattern is
#     validated on this repo.

trigger: none

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-24.04'

stages:
  - stage: Lint
    displayName: 'Lint and validate'
    jobs:
      - job: ValidateConfig
        displayName: 'Validate YAML and JSON'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.12'
            displayName: 'Use Python 3.12'

          - script: python -m pip install --upgrade pip pyyaml
            displayName: 'Install pyyaml'

          - script: |
              set -e
              fail=0
              while IFS= read -r -d '' f; do
                echo "Validating $f"
                if ! python -c "import sys, yaml; yaml.safe_load(open(sys.argv[1]))" "$f"; then
                  echo "::error file=$f::invalid YAML"
                  fail=1
                fi
              done < <(find . \( -path ./.git -o -path ./.venv -o -path ./node_modules -o -path ./.superpowers \) -prune -o \( -name '*.yaml' -o -name '*.yml' \) -type f -print0)
              exit $fail
            displayName: 'Validate YAML files'

          - script: |
              set -e
              fail=0
              while IFS= read -r -d '' f; do
                echo "Validating $f"
                if ! python -m json.tool "$f" > /dev/null; then
                  echo "::error file=$f::invalid JSON"
                  fail=1
                fi
              done < <(find . \( -path ./.git -o -path ./.venv -o -path ./node_modules -o -path ./.superpowers \) -prune -o -name '*.json' -type f -print0)
              exit $fail
            displayName: 'Validate JSON files'

      - job: MarkdownLint
        displayName: 'Lint markdown'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Use Node 20'

          - script: npm install -g markdownlint-cli@0.41.0
            displayName: 'Install markdownlint-cli'

          - script: |
              set -e
              markdownlint \
                --config .markdownlint.yaml \
                --ignore node_modules \
                --ignore .superpowers \
                --ignore .venv \
                "**/*.md"
            displayName: 'Run markdownlint'
