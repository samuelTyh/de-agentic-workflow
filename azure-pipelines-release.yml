# Scheduled release-cut pipeline for agent-workflow-dev.
#
# Runs at 18:00 UTC Monday through Thursday. If CHANGELOG.md has content
# under [Unreleased], opens a PR that moves that content into a new
# [YYYY.MM.DD] section. A maintainer reviews and merges the PR per normal
# branch policy.
#
# Why Mon-Thu only: avoid cutting a release on Friday or over the weekend
# when no one is around to review the PR. Anything that lands Fri-Sun
# accumulates in [Unreleased] and is swept up in the Monday cut.
#
# This pipeline must be registered once in Azure DevOps pointing at this YAML
# file — see docs/setup-guide.md for the one-time admin step.
#
# Permissions:
#   - The build service needs "Contribute" on the repo (default for the
#     project build service) so it can push to a feature branch.
#   - System.AccessToken is used for both git push (via persistCredentials)
#     and `az repos pr create` (via AZURE_DEVOPS_EXT_PAT env var).
#   - Branch protection still governs the merge — the PR goes through the
#     normal reviewer-approval flow.

trigger: none
pr: none

schedules:
  - cron: '0 18 * * 1-4'
    displayName: '18:00 UTC, Monday through Thursday'
    branches:
      include:
        - main
    always: true

pool:
  vmImage: 'ubuntu-24.04'

jobs:
  - job: CutRelease
    displayName: 'Cut release if [Unreleased] has content'
    steps:
      - checkout: self
        persistCredentials: true
        fetchDepth: 0

      - task: UsePythonVersion@0
        inputs:
          versionSpec: '3.12'
        displayName: 'Use Python 3.12'

      - script: |
          set -e
          TODAY="$(date -u +%Y.%m.%d)"
          BRANCH="release/${TODAY}"
          echo "##vso[task.setvariable variable=RELEASE_DATE]${TODAY}"
          echo "##vso[task.setvariable variable=RELEASE_BRANCH]${BRANCH}"
          echo "Target release date: ${TODAY}"
          echo "Target branch: ${BRANCH}"
        displayName: 'Resolve release date and branch name'

      - script: |
          set -e
          # Dry-run first so we can decide whether to proceed without modifying the file
          OUTPUT="$(python scripts/cut_release.py --date '$(RELEASE_DATE)' --dry-run 2>&1 || true)"
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q 'No unreleased changes'; then
            echo "##vso[task.setvariable variable=SHOULD_CUT]false"
            echo "Nothing to release — skipping the rest of the pipeline."
          elif echo "$OUTPUT" | grep -q '^ERROR:'; then
            echo "##[error]cut_release.py reported an error — see output above"
            exit 1
          else
            echo "##vso[task.setvariable variable=SHOULD_CUT]true"
          fi
        displayName: 'Check if [Unreleased] has content'

      - script: |
          set -e
          python scripts/cut_release.py --date '$(RELEASE_DATE)'
        displayName: 'Cut release in CHANGELOG.md'
        condition: eq(variables['SHOULD_CUT'], 'true')

      - script: |
          set -e
          git config user.name 'Azure Pipelines'
          git config user.email 'noreply@dev.azure.com'
          git checkout -b '$(RELEASE_BRANCH)'
          git add CHANGELOG.md
          git commit \
            -m "chore(changelog): cut release $(RELEASE_DATE)" \
            -m "[skip-changelog]" \
            -m "Automated by azure-pipelines-release.yml."
          git push origin '$(RELEASE_BRANCH)'
        displayName: 'Commit and push release branch'
        condition: eq(variables['SHOULD_CUT'], 'true')

      - script: |
          set -e
          DESC_FILE="$(mktemp)"
          {
            echo "Automated release cut by the daily scheduled pipeline."
            echo ""
            echo "This PR moves all bullets under \`[Unreleased]\` into a new \`[$(RELEASE_DATE)]\` section in CHANGELOG.md. No other changes."
            echo ""
            echo "After merge, PRs opened between now and the next scheduled run will add their bullets to the fresh \`[Unreleased]\` section."
            echo ""
            echo "Generated by: \`azure-pipelines-release.yml\`"
          } > "$DESC_FILE"

          az repos pr create \
            --repository enpal-energy-ds-agentic-workflow \
            --source-branch '$(RELEASE_BRANCH)' \
            --target-branch main \
            --title "chore(changelog): cut release $(RELEASE_DATE)" \
            --description "@$DESC_FILE" \
            --delete-source-branch true \
            --squash \
            --output none

          rm -f "$DESC_FILE"
          echo "PR opened for release $(RELEASE_DATE)."
        displayName: 'Open release PR'
        condition: eq(variables['SHOULD_CUT'], 'true')
        env:
          AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
