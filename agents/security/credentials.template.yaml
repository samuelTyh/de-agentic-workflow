# Credentials Template
# This documents all service credentials needed by the framework.
# Some are managed automatically (OAuth), others require env vars.

jira:
  # Handled by Claude Code built-in Atlassian Rovo connector.
  # Each user authenticates via OAuth in Claude Code UI.
  # No env vars needed — just run: Claude Code > Settings > Connectors > Atlassian Rovo > Connect
  auth_method: claude_code_builtin_oauth

notion:
  # Handled by Claude Code built-in Notion connector.
  # Each user authenticates via OAuth in Claude Code UI.
  # No env vars needed — just run: Claude Code > Settings > Connectors > Notion > Connect
  auth_method: claude_code_builtin_oauth

snowflake:
  # Self-hosted MCP server: Snowflake-Labs/mcp (Python 3.12+)
  # Install: pip install snowflake-mcp-server (or uv add snowflake-mcp-server)
  # Set these env vars in your shell profile or .env file:
  #
  # SNOWFLAKE_ACCOUNT   - Account identifier (e.g., xy12345.us-east-1)
  # SNOWFLAKE_USER      - Your Snowflake username
  # SNOWFLAKE_PASSWORD   - Your Snowflake password (or use key-pair auth)
  # SNOWFLAKE_ROLE       - Default role to use
  # SNOWFLAKE_WAREHOUSE  - Default warehouse
  account: "${SNOWFLAKE_ACCOUNT}"
  user: "${SNOWFLAKE_USER}"
  password: "${SNOWFLAKE_PASSWORD}"
  role: "${SNOWFLAKE_ROLE}"
  warehouse: "${SNOWFLAKE_WAREHOUSE}"

  # Migration: account B credentials (used by Migration Agent for A→B work)
  # SNOWFLAKE_ACCOUNT_B, SNOWFLAKE_USER_B, SNOWFLAKE_PASSWORD_B,
  # SNOWFLAKE_ROLE_B, SNOWFLAKE_WAREHOUSE_B
  account_b: "${SNOWFLAKE_ACCOUNT_B}"
  user_b: "${SNOWFLAKE_USER_B}"
  password_b: "${SNOWFLAKE_PASSWORD_B}"
  role_b: "${SNOWFLAKE_ROLE_B}"
  warehouse_b: "${SNOWFLAKE_WAREHOUSE_B}"

azure_devops:
  # Self-hosted MCP server: @azure-devops/mcp (npm)
  # Install: npx -y @azure-devops/mcp (auto-installed via config/mcp-servers.json)
  # Set these env vars:
  #
  # AZDO_PAT     - Personal Access Token from Azure DevOps > User Settings > PATs
  # AZDO_ORG_URL - Organization URL (e.g., https://dev.azure.com/yourorg)
  pat: "${AZDO_PAT}"
  org_url: "${AZDO_ORG_URL}"
