# Git Workflow Configuration
# Per-repo branching strategy. The Git Workflow Agent reads this to decide
# branch base, PR target, and what branches are protected.
#
# Strategies:
#   - github_flow: feature → PR → main (simple, continuous deploy)
#   - git_flow: feature → PR → <integration_branch> → release → main
#               (scheduled releases; team uses `dev` as the integration branch)
#
# Repo keys use the Azure DevOps full path: <project>/<repo>.
# `merge_style` is a map keyed by target branch. Values:
#   - squash
#   - merge_no_ff   (merge commit, no fast-forward)
#   - rebase
#
# To onboard a new repo: add an entry under `repos:` with its strategy.
# If a repo is not listed, the `default` entry applies.

default:
  strategy: github_flow
  protected_branches:
    - main
  branch_naming: "<type>/<description>"
  branch_types:
    - feat
    - fix
    - docs
    - style
    - refactor
    - test
    - chore
    - perf
  commit_convention: conventional_commits
  merge_style:
    main: squash
  delete_branch_after_merge: true
  stale_branch_days: 30

repos:
  # Snowflake data warehouse — DDL, pipelines, Snowpark procedures.
  # Uses GitHub Flow: short-lived feature branches against main.
  vpp-data-warehouse/vpp-data-warehouse:
    strategy: github_flow
    protected_branches:
      - main
    merge_style:
      main: squash

  # Snowpark apps + Streamlit apps. Git Flow for scheduled releases.
  vpp-data-warehouse/vpp-snowpark-apps:
    strategy: git_flow
    protected_branches:
      - main
      - dev
    merge_style:
      main: squash          # release/hotfix into main — squash
      dev: merge_no_ff      # feature into dev — merge commit preserves history
    flow_branches:
      main: production
      dev: integration
      feature_from: dev
      feature_merges_to: dev
      release_from: dev
      release_merges_to: [main, dev]
      hotfix_from: main
      hotfix_merges_to: [main, dev]

  # Airflow DAGs on Astronomer. Git Flow for release discipline.
  vpp-data-warehouse/vpp-airflow:
    strategy: git_flow
    protected_branches:
      - main
      - dev
    merge_style:
      main: squash
      dev: merge_no_ff
    flow_branches:
      main: production
      dev: integration
      feature_from: dev
      feature_merges_to: dev
      release_from: dev
      release_merges_to: [main, dev]
      hotfix_from: main
      hotfix_merges_to: [main, dev]

  # SnowDDL declarative DDL + RBAC (formerly referenced as dcm_mvp/snowddl_mvp).
  # Git Flow — schema changes gated by release discipline.
  vpp-data-warehouse/enpal-energy-ds-snowflake-infra:
    strategy: git_flow
    protected_branches:
      - main
      - dev
    merge_style:
      main: squash
      dev: merge_no_ff
    flow_branches:
      main: production
      dev: integration
      feature_from: dev
      feature_merges_to: dev
      release_from: dev
      release_merges_to: [main, dev]
      hotfix_from: main
      hotfix_merges_to: [main, dev]
